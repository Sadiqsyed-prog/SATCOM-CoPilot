[behave]
default_format = pretty
show_timings = true
color = true
junit = false
stdout_capture = true
stderr_capture = true
log_capture = true

[behave.formatters]
json = behave.formatter.json:JSONFormatter
html = behave.formatter.html:HTMLFormatter

[behave.paths]
features = features/

[behave.tags]
# Run core tests by default, exclude integration tests
default_tags = ~@integration ~@slow
